name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GNU Arm toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            cmake \
            make
      - name: Build debug
        run: ./scripts/build.sh debug
      - name: Build release
        run: ./scripts/build.sh release
      - name: Report release size
        run: ./scripts/size.sh release
      - name: Upload firmware images
        uses: actions/upload-artifact@v4
        with:
          name: vcu-firmware-release
          path: |
            build/release/VCU_Firmware.elf
            build/release/VCU_Firmware.hex
            build/release/VCU_Firmware.bin
            build/release/VCU_Firmware.map
          if-no-files-found: error

  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install host toolchain + gcovr
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc cmake make
          pip install --quiet gcovr
      - name: Configure (coverage on)
        run: cmake -S test -B build/test -DVCU_COVERAGE=ON
      - name: Build host tests
        run: cmake --build build/test
      - name: Run host tests
        run: ctest --test-dir build/test --output-on-failure
      - name: Coverage report (fail under 90% lines)
        run: |
          gcovr --root . --filter 'Core/(control|safety|proto)/' \
                --fail-under-line 90 --print-summary \
                --html-details build/test/coverage.html build/test
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build/test/coverage*.html

  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@v4
      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen
      - name: Generate API docs
        run: |
          mkdir -p build/doxygen
          doxygen Doxyfile
      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: build/doxygen/html
      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/doxygen/html

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang tooling
        # Pin clang-format so its output matches the version the tree was
        # formatted with (idempotent gate); clang-tidy tracks latest.
        run: pip install --quiet "clang-format==22.1.5" clang-tidy
      - name: clang-format (hand-written sources)
        run: ./scripts/format.sh check
      - name: clang-tidy (hardware-free modules)
        run: >
          clang-tidy --warnings-as-errors='*'
          Core/control/*.c Core/safety/*.c Core/proto/*.c
          -- -I Core -std=c11
